# M6-3: Prometheus scrape config for DDOKSORI.
# Scrapes the backend /metrics endpoint (M6-1) over the compose network.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ddoksori-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend
