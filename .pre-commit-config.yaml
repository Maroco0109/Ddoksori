# Pre-commit hooks for DDOKSORI project
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      # Run ruff linter
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
        files: ^backend/
      # Run ruff formatter
      - id: ruff-format
        types_or: [python, pyi]
        files: ^backend/
