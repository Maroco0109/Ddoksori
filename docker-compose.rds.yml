# Docker Compose Override for RDS (External Database)
# 
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.rds.yml up --build
#
# Prerequisites:
#   1. Set RDS connection info in backend/.env:
#      DB_HOST=your-instance.xxxx.ap-northeast-2.rds.amazonaws.com
#      DB_PORT=5432
#      DB_NAME=ddoksori
#      DB_USER=admin
#      DB_PASSWORD=your-secure-password
#
#   2. Ensure RDS security group allows your IP on port 5432
#
# What this file does:
#   - Removes local 'db' service (using external RDS instead)
#   - Removes 'cloudbeaver' service (use RDS console or local pgAdmin)
#   - Updates backend to connect to RDS via environment variables
#   - Removes postgres_data volume

version: '3.8'

services:
  # Disable local DB container
  db:
    profiles: ["disabled"]  # Effectively removes this service

  # Disable CloudBeaver (use RDS console instead)
  cloudbeaver:
    profiles: ["disabled"]

  backend:
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Override volumes - remove postgres_data since using RDS
volumes:
  bge_m3_model_cache:
  redis_data:
  prometheus_data:
  grafana_data:
  # postgres_data: removed (using RDS)
  # cloudbeaver_data: removed
