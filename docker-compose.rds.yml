# Docker Compose Override for RDS + OpenAI Embedding (E2E Test Environment)
#
# Usage (IMPORTANT: use --no-deps to skip local db):
#   docker compose -f docker-compose.yml -f docker-compose.rds.yml --env-file backend/.env up --no-deps -d backend frontend prometheus grafana
#
# To stop:
#   docker compose -f docker-compose.yml -f docker-compose.rds.yml down
#
# Prerequisites:
#   1. Set RDS connection info in backend/.env:
#      DB_TEST_HOST=your-instance.xxxx.region.rds.amazonaws.com
#      DB_TEST_USER=<username>
#      DB_TEST_PASSWORD=<password>
#      DB_TEST_NAME=ddoksori
#
#   2. Set OpenAI API key in backend/.env:
#      OPENAI_API_KEY=sk-...
#      USE_OPENAI_EMBEDDING=true
#
#   3. Ensure RDS security group allows your IP on port 5432
#
# What this file does:
#   - Updates backend to connect to RDS (using DB_TEST_* variables)
#   - Enables OpenAI Embedding (text-embedding-3-large)
#   - Removes backend dependency on local db
#   - Use selective service startup to avoid db/cloudbeaver/redis
#
# Services to start (explicitly specify):
#   - backend (FastAPI) - Port 8000
#   - frontend (React) - Port 5173
#   - prometheus - Port 9090
#   - grafana - Port 3000

services:
  # Backend: RDS connection + OpenAI Embedding
  backend:
    depends_on: {}  # Remove db dependency (empty dict to override)
    environment:
      # RDS connection (uses DB_TEST_* variables from .env)
      DB_HOST: ${DB_TEST_HOST}
      DB_PORT: ${DB_TEST_PORT:-5432}
      DB_NAME: ${DB_TEST_NAME:-ddoksori}
      DB_USER: ${DB_TEST_USER}
      DB_PASSWORD: ${DB_TEST_PASSWORD}
      # OpenAI Embedding (no local embedding server needed)
      USE_OPENAI_EMBEDDING: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: "text-embedding-3-large"
      EMBEDDING_DIMENSION: "1536"
      # Disable local embedding auto-start
      DISABLE_LOCAL_EMBED_AUTO_START: "true"
      # Disable Redis caching
      ENABLE_ANSWER_CACHE: "false"

# Override volumes - only keep what's needed
volumes:
  prometheus_data:
  grafana_data:
