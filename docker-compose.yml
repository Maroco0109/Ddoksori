services:
  # NOTE: CloudBeaver removed for security (SEC-41)
  # Use local DBeaver or pgAdmin for database management instead

  # PostgreSQL + pgvector (local RAG baseline target)
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ddoksori_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ddoksori}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      TZ: Asia/Seoul
    ports:
      # Host port defaults to 5433 to avoid colliding with the M1-5 source DB on 5432.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/database/init/00_extensions.sql:/docker-entrypoint-initdb.d/00_extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ddoksori}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ddoksori_backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./.env
        required: false
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-ddoksori}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - RETRIEVAL_MODE=${RETRIEVAL_MODE:-hybrid}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dev_redis_password_change_in_production}
      - ENABLE_ANSWER_CACHE=${ENABLE_ANSWER_CACHE:-false}
      - ENABLE_EMBEDDING_CACHE=${ENABLE_EMBEDDING_CACHE:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ddoksori_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_PROXY_TARGET=http://backend:8000
    command: npm run dev -- --host

  # Redis (Answer Caching) - SEC-40: Added authentication
  redis:
    image: redis:7-alpine
    container_name: ddoksori_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dev_redis_password_change_in_production}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_redis_password_change_in_production}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_password_change_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # M6-3: Prometheus (Layer 1 ops-health scrape of backend /metrics)
  prometheus:
    image: prom/prometheus:latest  # pin a version for prod reproducibility
    container_name: ddoksori_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - backend

  # M6-3: Grafana (dashboards over Prometheus + M3 Postgres)
  grafana:
    image: grafana/grafana:latest  # pin a version for prod reproducibility
    container_name: ddoksori_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      # DB creds for the provisioned PostgreSQL datasource (interpolated in datasources.yml)
      - DB_NAME=${DB_NAME:-ddoksori}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  prometheus_data:
  grafana_data:
