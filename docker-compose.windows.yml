version: '3.8'

services:
  # PostgreSQL 데이터베이스 with pgvector
  # Note: backup.sql 복원 시 FK 순서 문제를 방지하기 위해 init.sql 마운트 제거
  # 스키마는 backup.sql에 포함되어 있음
  db:
    image: pgvector/pgvector:pg16
    container_name: ddoksori_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ddoksori}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # backup.sql 복원 방식 사용 시 아래 마운트 불필요 (스키마 충돌 방지)
      # - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      # - ./backend/database/schema_v2_final.sql:/docker-entrypoint-initdb.d/02_schema_v2_final.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CloudBeaver (Web-based Database Manager)
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: ddoksori_cloudbeaver
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      - db

  # 임베딩 서버 (CPU 모드)
  embedding:
    build:
      context: ./backend
      dockerfile: Dockerfile.embedding
    container_name: ddoksori_embedding
    ports:
      - "8001:8001"
    environment:
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - embedding_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # FastAPI 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ddoksori_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REMOTE_EMBED_URL=http://embedding:8001/embed
    depends_on:
      db:
        condition: service_healthy
      embedding:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React 프론트엔드
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ddoksori_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host

  # BGE-M3 임베딩 서버 (Dense + Sparse)
  # PR-T5: Added profiles - use 'docker compose --profile bge-m3 up -d' to include
  bge_m3_embedding:
    profiles: ["bge-m3"]
    build:
      context: ./backend
      dockerfile: Dockerfile.bge_m3
    container_name: ddoksori_bge_m3
    ports:
      - "8003:8003"
    environment:
      - BGE_M3_PORT=8003
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - bge_m3_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  cloudbeaver_data:
  embedding_model_cache:
  bge_m3_model_cache:
