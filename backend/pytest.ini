[pytest]
testpaths = scripts/testing
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = app utils .git .venv __pycache__
addopts = -p no:asyncio --ignore=scripts/testing/__pycache__

# Phase 1.7: 커스텀 마커 등록 (리팩토링)
markers =
    # 기본 마커
    unit: Unit tests - DB 의존성 없음
    integration: Integration tests - PostgreSQL 필요

    # 기능별 마커
    api: API 엔드포인트 테스트
    orchestrator: 오케스트레이터 테스트
    agent: 에이전트 테스트
    retrieval: 검색 테스트
    generation: 답변 생성 테스트
    review: 검토 테스트
    react: ReAct 패턴 테스트

    # 실행 조건 마커
    slow: 느린 테스트 (LLM 호출 등)
    docker: Docker 환경 필요 (RUN_DOCKER_TESTS=1)
    skip_ci: CI에서 스킵 (GITHUB_ACTIONS 환경)
    llm: LLM API 호출 필요 (OPENAI_API_KEY)

    # 데이터 마커
    needs_db: DB 연결 필요
    needs_data: 시드 데이터 필요

    # 비동기 마커
    asyncio: 비동기 테스트 (pytest-asyncio)
