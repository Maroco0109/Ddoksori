name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  EC2_HOST: 15.165.215.141

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: read
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR Login
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          timeout: 60s
          script: |
            set -e  # 에러 시 즉시 종료
            cd /home/ubuntu/ddoksori

            # .env 파일 로드 (ECR_REGISTRY, USE_AWS_SECRETS 등)
            if [ -f .env ]; then
              echo "Loading .env file..."
              set -a
              source .env
              set +a
            fi

            # ECR_REGISTRY 검증
            if [ -z "$ECR_REGISTRY" ]; then
              echo "ERROR: ECR_REGISTRY is not set!"
              echo "Please create /home/ubuntu/ddoksori/.env with ECR_REGISTRY"
              exit 1
            fi
            echo "ECR_REGISTRY: $ECR_REGISTRY"

            # ECR 로그인
            echo "Logging into ECR..."
            aws ecr get-login-password --region ap-northeast-2 | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            # 이미지 Pull
            echo "Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull || {
              echo "ERROR: Failed to pull images"
              exit 1
            }

            # 배포 (zero-downtime)
            echo "Deploying containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 오래된 이미지 정리
            docker image prune -f

            # 상태 확인
            echo "=== Container Status ==="
            docker compose -f docker-compose.prod.yml ps

            # === Smoke Test (docker exec로 컨테이너 내부에서 테스트) ===
            echo "Waiting 30s for services to start..."
            sleep 30

            echo "=== Running Smoke Tests ==="
            BACKEND_CONTAINER=$(docker compose -f docker-compose.prod.yml ps -q backend)

            # 1. Health Check (필수 - DB 연결 확인)
            echo "Testing /health..."
            HEALTH=$(docker exec $BACKEND_CONTAINER curl -sf http://localhost:8000/health || echo '{"status":"error"}')
            if ! echo "$HEALTH" | grep -q '"status":"healthy"'; then
              echo "FAILED: /health"
              echo "Response: $HEALTH"
              echo "=== Backend Logs ==="
              docker compose -f docker-compose.prod.yml logs --tail 50 backend
              exit 1
            fi
            echo "OK: /health - DB connected"

            # 2. LLM Check (경고만 - 외부 서비스)
            echo "Testing /health/llm/supervisor..."
            LLM=$(docker exec $BACKEND_CONTAINER curl -sf http://localhost:8000/health/llm/supervisor || echo '{"status":"error"}')
            if echo "$LLM" | grep -q '"status":"healthy"'; then
              echo "OK: /health/llm/supervisor"
            else
              echo "WARNING: /health/llm/supervisor unhealthy (non-blocking)"
            fi

            # 3. Embedding Check (경고만 - 외부 서비스)
            echo "Testing /health/embedding..."
            EMBED=$(docker exec $BACKEND_CONTAINER curl -sf http://localhost:8000/health/embedding || echo '{"status":"error"}')
            if echo "$EMBED" | grep -q '"status":"healthy"'; then
              echo "OK: /health/embedding"
            else
              echo "WARNING: /health/embedding unhealthy (non-blocking)"
            fi

            # 4. Root endpoint (필수 - API 서버 응답)
            echo "Testing /..."
            ROOT=$(docker exec $BACKEND_CONTAINER curl -sf http://localhost:8000/ || echo '')
            if [ -z "$ROOT" ]; then
              echo "FAILED: / endpoint returned empty"
              exit 1
            fi
            echo "OK: / endpoint"

            echo "=== Smoke Tests Completed ==="

      - name: External Health Check
        run: |
          echo "Verifying external access to http://${{ env.EC2_HOST }}/health..."
          for i in {1..5}; do
            if curl -sf http://${{ env.EC2_HOST }}/health; then
              echo "External health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: External health check failed after 5 attempts"
          exit 1

      - name: Discord Notification - Success
        if: success() && env.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "Staging Deployment"
          description: |
            **Status**: Success
            **Commit**: `${{ github.event.workflow_run.head_sha }}`
            **Branch**: main
            **URL**: http://${{ env.EC2_HOST }}

      - name: Discord Notification - Failure
        if: failure() && env.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "Staging Deployment"
          description: |
            **Status**: Failed
            **Commit**: `${{ github.event.workflow_run.head_sha }}`
            **Branch**: main

            Check GitHub Actions for details.
